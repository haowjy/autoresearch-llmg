experiment_id: P0-TW-04
run_mode: eval_only
primary_metric: retrieval_recall@5
description: Phase 0 baseline sweep on TemporalWiki drift CL (base / harder triples)

params:
  k: 5
  max_agent_steps: 16
  agent_model: google/gemma-4-E4B-it
  max_eval_rows: null
  waves: null
  skip_agent: false
  # Official runs Wave A harness + Wave B agent (easy variant official is B-only).
  official_waves: ["A", "B"]

  wave_a_cells:
    - data_format: memory
      index_mode: train
      search_mode: harness_bm25
      eval_split: test
    - data_format: memory
      index_mode: train_stable
      search_mode: harness_bm25
      eval_split: stable
    - data_format: memory
      index_mode: train
      search_mode: harness_hybrid
      eval_split: test
    - data_format: memory
      index_mode: train_stable
      search_mode: harness_hybrid
      eval_split: stable

  wave_b_cells:
    - data_format: filesystem
      index_mode: train
      search_mode: agent_term_basic
      eval_split: test
    - data_format: filesystem
      index_mode: train
      search_mode: agent_term_hybrid
      eval_split: test
    - data_format: filesystem
      index_mode: train
      search_mode: harness_bm25
      eval_split: test
      note: rg_tree_parity

  wave_c_max_eval_rows: 30
